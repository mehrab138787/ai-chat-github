name: AI Response via OpenRouter

on:
  workflow_dispatch:
    inputs:
      gist_id:
        description: 'Gist ID'
        required: true
        type: string
      user_message:
        description: 'User message'
        required: true
        type: string

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: Call OpenRouter AI
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # تبدیل پیام به JSON-safe format
          USER_MSG=$(echo '${{ inputs.user_message }}' | jq -Rsa .)
          
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -d "{
              \"model\": \"openrouter/free\",
              \"messages\": [{\"role\": \"user\", \"content\": $USER_MSG}]
            }")
          
          echo "RESPONSE_JSON=$RESPONSE" >> $GITHUB_ENV
          
      - name: Extract and Update Gist
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          AI_TEXT=$(echo '${{ env.RESPONSE_JSON }}' | jq -r '.choices[0].message.content // "پاسخی دریافت نشد"')
          
          echo "AI_TEXT=$AI_TEXT" >> $GITHUB_ENV
          
          curl -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/gists/${{ inputs.gist_id }} \
            -d "{
              \"files\": {
                \"message.json\": {
                  \"content\": $(echo '{
                    \"user_message\": \"'${{ inputs.user_message }}'\",
                    \"ai_response\": \"'$AI_TEXT'\",
                    \"timestamp\": \"'$(date -Iseconds)'\",
                    \"status\": \"completed\"
                  }' | jq -Rsa .)
                }
              }
            }"
