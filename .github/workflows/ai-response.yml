name: AI Response via OpenRouter

on:
  workflow_dispatch:
    inputs:
      gist_id:
        description: 'Gist ID containing the message'
        required: true
        type: string
      user_message:
        description: 'User message'
        required: true
        type: string

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: Call OpenRouter AI
        id: ai
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          ESCAPED_MSG=$(echo '${{ inputs.user_message }}' | sed "s/'/\\'/g")
          
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -d '{
              "model": "google/gemini-2.0-flash-exp:free",
              "messages": [{"role": "user", "content": "'"$ESCAPED_MSG"'"}]
            }')
          
          AI_TEXT=$(echo $RESPONSE | jq -r '.choices[0].message.content')
          echo "AI_TEXT=$AI_TEXT" >> $GITHUB_ENV
          
      - name: Update Gist with AI response
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          NEW_CONTENT=$(jq -n \
            --arg user "${{ inputs.user_message }}" \
            --arg ai "$AI_TEXT" \
            '{user_message: $user, ai_response: $ai, timestamp: (now | todateiso8601), status: "completed"}')
          
          curl -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/gists/${{ inputs.gist_id }} \
            -d "{\"files\":{\"message.json\":{\"content\":$(echo $NEW_CONTENT | jq -Rsa)}}}"
