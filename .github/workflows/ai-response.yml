name: AI Response

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'User message'
        required: true
        type: string
      id:
        description: 'Gist ID'
        required: true
        type: string

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - name: Call OpenRouter AI
        id: ai
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # درخواست مستقیم با timeout کمتر
          RESPONSE=$(curl -s --max-time 15 \
            -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENROUTER_KEY" \
            -d "{\"model\":\"openrouter/free\",\"messages\":[{\"role\":\"user\",\"content\":\"${{ inputs.message }}\"}]}")
          
          ANSWER=$(echo $RESPONSE | jq -r '.choices[0].message.content // "پاسخی دریافت نشد"')
          echo "ANSWER<<EOF" >> $GITHUB_ENV
          echo "$ANSWER" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
      - name: Update Gist
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # آپدیت سریع Gist
          curl -s -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/gists/${{ inputs.id }} \
            -d "{\"files\":{\"response.txt\":{\"content\":$(echo "${{ env.ANSWER }}" | jq -Rsa .)}}}"
