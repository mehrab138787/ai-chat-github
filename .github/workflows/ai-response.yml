name: AI Response

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'User message'
        required: true
        type: string
      id:
        description: 'Request ID'
        required: true
        type: string

jobs:
  respond:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Call OpenRouter
        id: ai
        run: |
          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{"model":"openrouter/free","messages":[{"role":"user","content":"${{ inputs.message }}"}]}')
          
          ANSWER=$(echo $RESPONSE | jq -r '.choices[0].message.content')
          echo "answer=$ANSWER" >> $GITHUB_OUTPUT
          
      - name: Save response to file
        run: |
          echo '${{ steps.ai.outputs.answer }}' > response_${{ inputs.id }}.txt
          
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add response_${{ inputs.id }}.txt
          git commit -m "Add response for ${{ inputs.id }}" || echo "No changes"
          git push
